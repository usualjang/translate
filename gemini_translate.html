<title>Gemini Translate</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #f0f0f0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  .settings { padding: 0.7rem 1rem; border-bottom: 0.5px solid #2a2a2a; display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; flex-shrink: 0; }
  .sg { display: flex; flex-direction: column; gap: 3px; }
  .sg label { font-size: 11px; color: #555; }
  input[type="password"] { background: #1c1c1e; border: 0.5px solid #444; border-radius: 8px; color: #f0f0f0; font-size: 14px; padding: 7px 10px; outline: none; width: 200px; }
  select { background: #1c1c1e; border: 0.5px solid #444; border-radius: 8px; color: #f0f0f0; font-size: 14px; padding: 7px 10px; outline: none; -webkit-appearance: none; }
  .btns { display: flex; gap: 7px; margin-left: auto; align-items: flex-end; }
  button { padding: 8px 16px; font-size: 14px; font-weight: 500; border-radius: 8px; border: none; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  #startBtn { background: #0a84ff; color: #fff; }
  #startBtn:disabled { background: #1a3a5c; color: #555; }
  #stopBtn { background: transparent; color: #ff453a; border: 0.5px solid #ff453a; }
  #stopBtn:disabled { opacity: 0.3; }
  #clearBtn { background: transparent; color: #888; border: 0.5px solid #444; }

  .statusbar { padding: 4px 1rem; display: flex; align-items: center; gap: 7px; font-size: 11px; color: #555; border-bottom: 0.5px solid #1a1a1a; flex-shrink: 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
  .dot.connected { background: #30d158; }
  .dot.recording { background: #ff453a; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .err { color: #ff453a; margin-left: auto; font-size: 11px; }

  .translate-area { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  .col { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .col-header { padding: 6px 1rem 5px; font-size: 11px; color: #555; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 0.5px solid #1a1a1a; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  .copy-btn { font-size: 11px; color: #0a84ff; background: transparent; border: 0.5px solid #0a84ff44; border-radius: 5px; padding: 2px 8px; cursor: pointer; font-weight: 400; letter-spacing: 0; text-transform: none; }
  .copy-btn.copied { color: #30d158; border-color: #30d15844; }
  .col-body { flex: 1; overflow-y: auto; padding: 0.8rem 1rem; -webkit-overflow-scrolling: touch; min-height: 0; }
  .divider { width: 0.5px; background: #222; flex-shrink: 0; }

  .para { margin-bottom: 14px; }
  .para .ts { display: block; font-size: 10px; color: #3a3a3a; margin-bottom: 3px; }
  .para .pt { font-size: 15px; line-height: 1.75; color: #e0e0e0; word-break: break-word; }
  .para.ko .pt { color: #d0ecd0; }

  @media (max-width: 599px) {
    .settings { flex-direction: column; }
    input[type="password"] { width: 100%; }
    .btns { margin-left: 0; width: 100%; }
    .btns button { flex: 1; }
    .translate-area { flex-direction: column; }
    .divider { width: 100%; height: 0.5px; }
  }
</style>
</head>
<body>

<div class="settings">
  <div class="sg">
    <label>Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
  </div>
  <div class="sg">
    <label>번역 방향</label>
    <select id="targetLang">
      <option value="ko|en">영어 → 한국어</option>
      <option value="en|ko">한국어 → 영어</option>
      <option value="ko|ja">일본어 → 한국어</option>
      <option value="ja|ko">한국어 → 일본어</option>
      <option value="ko|zh">중국어 → 한국어</option>
      <option value="zh|ko">한국어 → 중국어</option>
    </select>
  </div>
  <div class="btns">
    <button id="startBtn" onclick="startTranslation()">시작</button>
    <button id="stopBtn" onclick="stopTranslation()" disabled>중지</button>
    <button id="clearBtn" onclick="clearAll()">지우기</button>
  </div>
</div>

<div class="statusbar">
  <span class="dot" id="dot"></span>
  <span id="statusText">대기 중</span>
  <span class="err" id="err"></span>
</div>

<div class="translate-area">
  <div class="col">
    <div class="col-header">
      <span id="srcLabel">원문 (영어)</span>
      <button class="copy-btn" id="copySrc" onclick="copyCol('srcBox','copySrc')">복사</button>
    </div>
    <div class="col-body" id="srcBox"></div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="col-header">
      <span id="dstLabel">번역 (한국어)</span>
      <button class="copy-btn" id="copyDst" onclick="copyCol('dstBox','copyDst')">복사</button>
    </div>
    <div class="col-body" id="dstBox"></div>
  </div>
</div>

<script>
let ws = null, stream = null, actx = null, proc = null;
const SR = 16000;
const langName = { ko:'한국어', en:'영어', ja:'일본어', zh:'중국어' };
const srcTimer_ = {id: null};
const dstTimer_ = {id: null};
const PARA_GAP = 2500;

function setStatus(t, txt) {
  document.getElementById('dot').className = 'dot' + (t ? ' '+t : '');
  document.getElementById('statusText').textContent = txt;
}
function showErr(m) { document.getElementById('err').textContent = m; }
function clearAll() {
  document.getElementById('srcBox').innerHTML = '';
  document.getElementById('dstBox').innerHTML = '';
  srcTimer_.id = dstTimer_.id = null;
  showErr('');
}
function ts() { return new Date().toTimeString().slice(0,8); }

function appendText(boxId, text, cls, timerRef) {
  if (!text || !text.trim()) return;
  const box = document.getElementById(boxId);
  if (timerRef.id) { clearTimeout(timerRef.id); timerRef.id = null; }
  const last = box.lastElementChild;
  if (last && last.classList.contains('active')) {
    last.querySelector('.pt').textContent += ' ' + text.trim();
  } else {
    const p = document.createElement('div');
    p.className = 'para active' + (cls ? ' '+cls : '');
    p.innerHTML = '<span class="ts">'+ts()+'</span><span class="pt">'+text.trim()+'</span>';
    box.appendChild(p);
  }
  box.scrollTop = box.scrollHeight;
  timerRef.id = setTimeout(() => {
    const cur = box.lastElementChild;
    if (cur) cur.classList.remove('active');
    timerRef.id = null;
  }, PARA_GAP);
}

function updateLabels() {
  const val = document.getElementById('targetLang').value;
  const [dst, src] = val.split('|');
  document.getElementById('srcLabel').textContent = '원문 (' + (langName[src]||src) + ')';
  document.getElementById('dstLabel').textContent = '번역 (' + (langName[dst]||dst) + ')';
}
document.getElementById('targetLang').addEventListener('change', updateLabels);

async function copyCol(boxId, btnId) {
  const box = document.getElementById(boxId);
  const text = Array.from(box.querySelectorAll('.pt')).map(el => el.textContent.trim()).filter(Boolean).join('\n\n');
  try {
    await navigator.clipboard.writeText(text);
  } catch(_) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
  const btn = document.getElementById(btnId);
  btn.textContent = '완료'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
}

function f32i16(buf) {
  const o = new Int16Array(buf.length);
  for (let i=0;i<buf.length;i++) { const s=Math.max(-1,Math.min(1,buf[i])); o[i]=s<0?s*0x8000:s*0x7FFF; }
  return o;
}
function b64(i16) {
  const b=new Uint8Array(i16.buffer); let s='';
  for (let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]);
  return btoa(s);
}

async function parse(e) {
  let txt = typeof e.data==='string' ? e.data : (e.data instanceof Blob ? await e.data.text() : new TextDecoder().decode(e.data));
  try {
    const d = JSON.parse(txt);
    const sc = d.serverContent;
    if (!sc) return;
    if (sc.inputTranscription?.text) appendText('srcBox', sc.inputTranscription.text, '', srcTimer_);
    if (sc.outputTranscription?.text) appendText('dstBox', sc.outputTranscription.text, 'ko', dstTimer_);
    (sc.modelTurn?.parts||[]).forEach(p => { if(p.text) appendText('dstBox', p.text, 'ko', dstTimer_); });
  } catch(_){}
}

async function startTranslation() {
  showErr('');
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { showErr('API Key를 입력해주세요.'); return; }
  const [targetLang] = document.getElementById('targetLang').value.split('|');
  updateLabels();

  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio:{sampleRate:SR,channelCount:1,echoCancellation:true,noiseSuppression:true}, video:false });
  } catch(err) { showErr('마이크 권한 필요: '+err.message); return; }

  setStatus('','연결 중...');
  document.getElementById('startBtn').disabled = true;

  ws = new WebSocket('wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key='+key);
  ws.binaryType = 'blob';

  ws.onopen = () => {
    ws.send(JSON.stringify({ setup:{ model:'models/gemini-3.5-live-translate-preview', generationConfig:{ responseModalities:['AUDIO'], translationConfig:{ targetLanguageCode:targetLang, echoTargetLanguage:false } } } }));
    setStatus('connected','연결됨');
    document.getElementById('stopBtn').disabled = false;
    actx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:SR});
    const src = actx.createMediaStreamSource(stream);
    proc = actx.createScriptProcessor(2048,1,1);
    proc.onaudioprocess = ev => {
      if (!ws||ws.readyState!==1) return;
      ws.send(JSON.stringify({ realtimeInput:{ audio:{ data:b64(f32i16(ev.inputBuffer.getChannelData(0))), mimeType:'audio/pcm;rate=16000' } } }));
    };
    src.connect(proc); proc.connect(actx.destination);
    setStatus('recording','녹음 중 — 말씀하세요');
  };
  ws.onmessage = ev => parse(ev);
  ws.onerror = () => { showErr('연결 오류.'); cleanup(); };
  ws.onclose = ev => { if(ev.code!==1000) showErr('연결 끊김 ('+ev.code+') '+(ev.reason||'')); cleanup(); };
}

function cleanup() {
  if(proc){try{proc.disconnect();}catch(_){} proc=null;}
  if(actx){try{actx.close();}catch(_){} actx=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop()); stream=null;}
  if(ws){try{ws.close(1000);}catch(_){} ws=null;}
  if(srcTimer_.id){clearTimeout(srcTimer_.id); srcTimer_.id=null;}
  if(dstTimer_.id){clearTimeout(dstTimer_.id); dstTimer_.id=null;}
  document.querySelectorAll('.para.active').forEach(p=>p.classList.remove('active'));
  setStatus('','대기 중');
  document.getElementById('startBtn').disabled=false;
  document.getElementById('stopBtn').disabled=true;
}
function stopTranslation(){cleanup();}
</script>
</body>
</html>
